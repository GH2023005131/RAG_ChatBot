image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.pre-commit-cache"

cache:
  paths:
    - .pip-cache/
    - .pre-commit-cache/

before_script:
  - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr
  - pip install -r requirements-dev.txt

stages:
  - lint
  - format
  - type_check
  - security
  - dependency_audit
  - test
  - coverage

ruff-lint:
  stage: lint
  script:
    - ruff check .

ruff-format:
  stage: format
  script:
    - ruff format --check .

mypy:
  stage: type_check
  script:
    - mypy --no-strict-optional --ignore-missing-imports --follow-imports=skip .

pyrefly:
  stage: type_check
  script:
    - pyrefly check

bandit:
  stage: security
  script:
    - bandit -ll --skip=B101 -r .

detect-secrets:
  stage: security
  script:
    - detect-secrets-hook --baseline .secrets.baseline $(find . -type f -not -path './.venv/*' -not -path './.git/*' -not -path './__pycache__/*' | xargs)

pip-audit:
  stage: dependency_audit
  script:
    - pip-audit --desc on -r requirements.txt
  allow_failure: true

pytest:
  stage: test
  script:
    - pytest

coverage-report:
  stage: coverage
  script:
    - pytest --cov --cov-report=term --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
